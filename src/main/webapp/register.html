<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register for Food Delivery App</title>
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* General Styles for Register Page */
        :root {
            --primary-color: #F0BB78; /* Orange/Yellow tone for buttons/accents */
            --secondary-color: #543A14; /* Brown/Earth tone for secondary elements */
            --dark-color: #131010; /* Dark for general text and headings */
            --light-color: #FFF0DC; /* Light/Creamy for input backgrounds and form itself */
            --white-color: #FFF0DC; /* Using the creamy white for backgrounds */
            --text-color: #131010; /* Standard text color */
            --heading-color: #131010; /* Darker heading color */
            --form-bg-color: var(--white-color); /* Form background using creamy white */
            --border-color: rgba(84, 58, 20, 0.2); /* Subtle brown tint for borders */
            --focus-shadow-color: rgba(240, 187, 120, 0.4); /* Transparent primary for focus */
            --button-gradient-start: #543A14; /* Darker brown for button gradient start */
            --button-gradient-end: #F0BB78; /* Lighter orange/yellow for button gradient end */
            --page-gradient-start: #543A14; /* Brown for page background start */
            --page-gradient-end: #131010; /* Dark for page background end */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: linear-gradient(to right, var(--page-gradient-start), var(--page-gradient-end));
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h2 {
            font-size: 2.2rem;
            margin-bottom: 30px;
            font-weight: 700;
            color: #F0BB78;
            text-align: center;
            position: relative;
        }

       /*  h2::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -10px;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background-color: var(--primary-color);
            border-radius: 2px;
        } */

        /* Register Form Container */
        .form-container {
            padding: 45px;
            border-radius: 10px;
            max-width: 700px; /* Wider for two columns */
            width: 95%;
           
            text-align: left;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Two columns */
            gap: 20px 30px; /* Gap between rows and columns */
        }

        .form-group {
            margin-bottom: 0; /* Managed by grid gap */
        }

        .form-group.full-width {
            grid-column: 1 / -1; /* Spans across both columns */
        }

        .form-container label {
            display: block; /* Labels above inputs */
            margin-bottom: 8px; /* Space between label and input */
            color: #F0BB78;
            font-weight: 500;
            font-size: 1rem;
            text-align: left;
            padding-right: 0;
        }

        .form-container input[type="text"],
        .form-container input[type="password"],
        .form-container input[type="email"],
        .form-container input[type="tel"],
        .form-container select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            background-color: var(--light-color);
            color: var(--text-color);
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 20px;
            padding-right: 40px;
        }
        
        .form-group select{
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="%23543A14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-chevron-down"><polyline points="6 9 12 15 18 9"></polyline></svg>');
        }

        .form-container input[type="text"]:focus,
        .form-container input[type="password"]:focus,
        .form-container input[type="email"]:focus,
        .form-container input[type="tel"]:focus,
        .form-container select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--focus-shadow-color);
            outline: none;
        }

        /* Radio Button Styling */
        .radio-group {
            display: flex;
            align-items: center;
            gap: 25px; /* Space between radio options */
            margin-top: 5px; /* Slight margin above radios */
        }

        .radio-group label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 1rem;
            color: var(--dark-color);
            font-weight: 400; /* Lighter font weight for radio labels */
            margin-bottom: 0; /* Remove default label margin */
        }

        .radio-group input[type="radio"] {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--secondary-color);
            border-radius: 50%;
            margin-right: 8px;
            cursor: pointer;
            outline: none;
            position: relative;
            transition: all 0.2s ease;
        }

        .radio-group input[type="radio"]:checked {
            border-color: var(--primary-color);
            background-color: var(--primary-color);
        }

        .radio-group input[type="radio"]:checked::before {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            background-color: var(--white-color);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .radio-group input[type="radio"]:focus {
            box-shadow: 0 0 0 3px var(--focus-shadow-color);
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(to right, var(--button-gradient-start), var(--button-gradient-end)); /* Gradient button */
            color: var(--white-color);
            border: none;
            border-radius: 6px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            letter-spacing: 0.5px;
            margin-top: 30px; /* Space above button */
        }

        .btn-submit:hover {
            background-position: 100% 0; /* Slide gradient effect */
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            opacity: 0.95;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .form-container {
                padding: 30px;
                max-width: 95%;
            }

            .form-grid {
                grid-template-columns: 1fr; /* Single column on smaller screens */
                gap: 15px; /* Adjust gap for single column */
            }

            h2 {
                font-size: 2rem;
            }

            h2::after {
                bottom: -8px;
            }

            .form-group {
                margin-bottom: 0; /* Managed by grid gap */
            }

            .form-container label {
                width: auto; /* Auto width for stacked labels */
                text-align: left;
                margin-bottom: 8px;
                padding-right: 0;
            }

            .radio-group {
                flex-direction: column; /* Stack radio buttons */
                align-items: flex-start;
                gap: 15px;
            }
        }

        @media (max-width: 480px) {
            .form-container {
                padding: 25px;
            }

            h2 {
                font-size: 1.8rem;
            }

            .form-container input[type="text"],
            .form-container input[type="password"],
            .form-container input[type="email"],
            .form-container input[type="tel"],
            .form-container select {
                padding: 10px 12px;
                font-size: 0.95rem;
            }

            .btn-submit {
                padding: 14px;
                font-size: 1.1rem;
            }

            .radio-group label {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Registration</h2>
        <form action="CallingRegisterServlet" method="POST">
            <div class="form-grid">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your name">
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your username">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="phoneno">Phone Number</label>
                    <input type="tel" id="phoneno" name="phoneno" required placeholder="Enter your number">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" required placeholder="Confirm your password">
                </div>

                

                <!-- Original 'Address' field - now spanning full width -->
                <div class="form-group full-width">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" required placeholder="Your full delivery address">
                </div>

                <!-- Original 'Role' field - now spanning full width -->
                <div class="form-group full-width">
                    <label for="role">Role</label>
                    <select id="role" name="role">
                        <option value="customer">Customer</option>
                        <option value="restaurant admin">Restaurant Admin</option>
                        <option value="super admin">Super Admin</option>
                        <option value="delivery agent">Delivery Agent</option>
                    </select>
                </div>

            </div>
            <button type="submit" class="btn-submit">Register</button>
        </form>
    </div>

</body>
</html>
